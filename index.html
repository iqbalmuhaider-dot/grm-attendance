<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Kehadiran Gotong Royong Madani</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .form-content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #f5576c; }
        .btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-message { display: none; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 40px; border-radius: 15px; margin: 20px; text-align: center; }
        .success-message h3 { font-size: 28px; margin-bottom: 10px; }
        .success-message p { font-size: 16px; opacity: 0.9; }
        .error-message { display: none; background: #ff6b6b; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; font-size: 12px; }
        .loading { position: relative; }
        .loading::after { content: ''; position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; margin: -10px 0 0 -10px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .debug { background: #f0f0f0; padding: 10px; margin-top: 10px; font-size: 12px; display: none; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>🏠 GOTONG ROYONG MADANI</h1>
            <p>Tarikh: 19 Oktober 2026</p>
        </div>
        <form class="form-content" id="attendanceForm">
            <div class="form-group">
                <label for="nama">Nama Penuh *</label>
                <input type="text" id="nama" name="nama" required>
            </div>
            <div class="form-group">
                <label for="no_ic">No. IC *</label>
                <input type="text" id="no_ic" name="no_ic" required maxlength="12">
            </div>
            <div class="form-group">
                <label for="no_tel">No. Telefon</label>
                <input type="tel" id="no_tel" name="no_tel">
            </div>
            <div class="form-group">
                <label for="alamat">Alamat</label>
                <textarea id="alamat" name="alamat" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label for="jantina">Jantina *</label>
                <select id="jantina" name="jantina" required>
                    <option value="">-- Sila Pilih --</option>
                    <option value="lelaki">Lelaki</option>
                    <option value="perempuan">Perempuan</option>
                </select>
            </div>
            <div class="form-group">
                <label for="kaum">Kaum *</label>
                <select id="kaum" name="kaum" required>
                    <option value="">-- Sila Pilih --</option>
                    <option value="melayu">Melayu</option>
                    <option value="cina">Cina</option>
                    <option value="india">India</option>
                    <option value="lain">Lain-Lain</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pekerjaan">Pekerjaan</label>
                <input type="text" id="pekerjaan" name="pekerjaan">
            </div>
            <div class="form-group">
                <label for="hadir">Status Kehadiran *</label>
                <select id="hadir" name="hadir" required>
                    <option value="">-- Sila Pilih --</option>
                    <option value="hadir">HADIR</option>
                    <option value="tidak_hadir">TIDAK HADIR</option>
                    <option value="tidak_yakin">TIDAK YAKIN</option>
                </select>
            </div>
            <div class="form-group">
                <label for="sumbangan_type">Jenis Sumbangan</label>
                <select id="sumbangan_type" name="sumbangan_type">
                    <option value="tiada">Tiada</option>
                    <option value="wang">Wang (RM)</option>
                    <option value="barang">Barang</option>
                    <option value="tenaga">Tenaga (Labor)</option>
                </select>
            </div>
            <div class="form-group" id="sumbangan_group" style="display:none;">
                <label for="sumbangan">Nilai/Rincian</label>
                <input type="text" id="sumbangan" name="sumbangan">
            </div>
            <button type="submit" class="btn" id="submitBtn">Hantar Borang 📝</button>
            <div class="debug" id="debug"></div>
        </form>
        <div class="error-message" id="errorMessage">
            <h3>❌ Ralat!</h3>
            <p id="errorText">Maaf, berlaku ralat. Sila cuba lagi.</p>
        </div>
        <div class="footer">
            <p>SK Masjid Tanah (Integrasi)</p>
        </div>
    </div>

    <!-- Success Popup -->
    <div class="success-message" id="successMessage">
        <h3>🎉 TERIMA KASIH!</h3>
        <p> Maklumat anda telah berjaya disimpan.</p>
        <p style="margin-top: 20px; font-size: 14px;">No. IC: <strong id="confirm_ic"></strong></p>
        <p>Nama: <strong id="confirm_nama"></strong></p>
    </div>

    <script>
        // Show/hide sumbangan field
        document.getElementById('sumbangan_type').addEventListener('change', function() {
            document.getElementById('sumbangan_group').style.display = this.value !== 'tiada' ? 'block' : 'none';
        });
        
        // Handle form submission
        document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('attendanceForm');
            const debug = document.getElementById('debug');
            
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Menghantar...';
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // D1 credentials
            const D1_DB_ID = 'c9acf080-39c3-4e4c-ba95-39c2e806f270';
            const ACCOUNT_ID = '3cc808af04ffee93fa6b37664117177c';
            const API_TOKEN = 'iNZbOmv5txx08ahAa6IESLhRGRgZm91bri8Jp_N0';
            
            const sql = `INSERT INTO kehadiran (nama, no_ic, no_tel, alamat, jantina, kaum, pekerjaan, hadir, sumbangan_type, sumbangan) VALUES ('${data.nama.replace(/'/g, "''")}', '${(data.no_ic || '').replace(/'/g, "''")}', '${(data.no_tel || '').replace(/'/g, "''")}', '${(data.alamat || '').replace(/'/g, "''")}', '${data.jantina}', '${data.kaum}', '${(data.pekerjaan || '').replace(/'/g, "''")}', '${data.hadir}', '${data.sumbangan_type}', '${(data.sumbangan || '').replace(/'/g, "''")}')`;
            
            debug.style.display = 'block';
            debug.textContent = 'Sending to D1...';
            
            try {
                const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/d1/database/${D1_DB_ID}/query`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ sql: sql })
                });
                
                const result = await response.json();
                debug.textContent = 'Response: ' + JSON.stringify(result);
                
                if (result.success) {
                    // Show success message
                    document.getElementById('mainContainer').style.display = 'none';
                    document.getElementById('confirm_nama').textContent = data.nama;
                    document.getElementById('confirm_ic').textContent = data.no_ic;
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    throw new Error(result.errors?.[0]?.message || 'Insert failed');
                }
            } catch (error) {
                console.error('Error:', error);
                debug.textContent = 'Error: ' + error.message;
                document.getElementById('errorText').textContent = error.message;
                document.getElementById('errorMessage').style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = 'Hantar Borang 📝';
            }
        });
    </script>
</body>
</html>
